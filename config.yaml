# Configuration for the TCGA lung-cancer analysis.
# Edit the study/profile IDs to target a different cohort or data release.

cbioportal:
  base_url: "https://www.cbioportal.org/api"
  timeout: 60          # seconds per HTTP request
  page_size: 10000     # pagination size for list endpoints

# UCSC Xena hosts TCGA miRNA expression (cBioPortal does not for PanCancer).
# host keys: tcga / gdc / pancanatlas (see mirna_tcga.xena.HOSTS)
xena:
  host: "tcga"
  timeout: 120

# TCGA miRNA mature-strand expression datasets on the Xena 'tcga' hub.
xena_mirna:
  luad: "TCGA.LUAD.sampleMap/miRNA_HiSeq_gene"
  lusc: "TCGA.LUSC.sampleMap/miRNA_HiSeq_gene"

# miRBase mature.fa for MIMAT-accession -> hsa-miR name lookup (URL or local path).
mirbase_mature_fa: "https://raw.githubusercontent.com/nf-core/test-datasets/smrnaseq/reference/mature.fa"

# Local BCR Biotab clinical supplements (from GDCdownload with
# data.type="Clinical Supplement", data.format="BCR Biotab"). Used to enrich the
# distant-metastasis endpoint far beyond pathologic M1 -- clinical M1 + follow-up
# 'Distant Metastasis' new-tumor events lift the confirmed-metastatic NSCLC set
# from ~33 to ~127 (see mirna_tcga.biotab). The download is large and NOT
# committed; point this at the local GDCdata dir. null => pathologic-M1 only.
biotab:
  root: "TCGA/GDCdata"

# TCGA lung studies on cBioPortal (PanCancer Atlas).
studies:
  luad: "luad_tcga_pan_can_atlas_2018"
  lusc: "lusc_tcga_pan_can_atlas_2018"

# Named groupings of studies. NSCLC (non-small-cell lung cancer) spans both
# adenocarcinoma (LUAD) and squamous-cell carcinoma (LUSC).
cohorts:
  nsclc: ["luad", "lusc"]

# Pathway gene-set libraries (GMT) for the survival-screen over-representation
# analysis (scripts/09_survival_screen.py). Values may be URLs or local paths.
gene_sets:
  KEGG_2016: "https://raw.githubusercontent.com/zqfang/GSEApy/master/tests/extdata/enrichr.KEGG_2016.gmt"
  Hallmark: "https://raw.githubusercontent.com/zqfang/GSEApy/master/tests/extdata/h.all.v7.0.symbols.gmt"

# Molecular profile + sample-list suffixes are appended to each study id, e.g.
#   "luad_tcga_pan_can_atlas_2018_rna_seq_v2_mrna"
# Discover the exact ids available for a study with:
#   client.get_molecular_profiles(study_id) / client.get_sample_lists(study_id)
profiles:
  mrna_suffix: "_rna_seq_v2_mrna"          # mRNA expression (RSEM)
  mutation_suffix: "_mutations"            # mutation calls
  cna_suffix: "_gistic"                    # discrete GISTIC copy-number (-2..+2)
  # NOTE: miRNA expression is NOT available for most PanCancer studies on
  # cBioPortal. For miRNA use a Firehose-legacy study that has it, or switch
  # the data layer to UCSC Xena / GDC. Left here for when a profile exists.
  mirna_suffix: "_mirna"

sample_lists:
  all_suffix: "_all"                       # every sample in the study
  cna_suffix: "_cna"                       # samples with copy-number data
  sequenced_suffix: "_sequenced"           # samples with mutation data

analysis:
  mutation_gene: "TP53"                    # gene for mutant-vs-wildtype split
  # Threshold grid for the nearest-shrunken-centroid (PAM) model.
  pam_thresholds: null                     # null => auto grid from data
  cv_folds: 5
  random_state: 42
